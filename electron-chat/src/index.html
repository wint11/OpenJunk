<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pet Chat</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="history.css">
</head>
<body>
  <!-- 登录/设置界面 (Overlay) -->
  <div id="overlayPanel" class="overlay-panel">
    <div class="panel-header">
      <span id="panelTitle">登录</span>
      <div class="header-btns">
        <button id="closePanelBtn" class="close-btn" title="关闭">×</button>
      </div>
    </div>
    
    <!-- 登录表单 -->
    <div id="loginForm" class="panel-content">
      <div class="form-group">
        <input type="email" id="email" placeholder="邮箱">
      </div>
      <div class="form-group">
        <input type="password" id="password" placeholder="密码">
      </div>
      <div class="form-group action-row">
        <button id="settingsBtn" class="icon-btn" title="设置">⚙</button>
        <button id="loginBtn" class="primary-btn">连接</button>
      </div>
    </div>

    <!-- 设置表单 -->
    <div id="settingsForm" class="panel-content hidden">
      <div class="form-group">
        <label>服务器</label>
        <input type="text" id="serverUrlInput" placeholder="http://...">
      </div>
      <div class="form-group">
        <label>宠物形象</label>
        <select id="petSelect">
          <option value="🐱">🐱 猫咪</option>
          <option value="🐶">🐶 狗狗</option>
          <option value="👻">👻 幽灵</option>
          <option value="🤖">🤖 机器人</option>
          <option value="👽">👽 外星人</option>
          <option value="🐸">🐸 青蛙</option>
        </select>
      </div>
      <div class="form-group action-row">
        <button id="backBtn" class="text-btn">返回</button>
        <button id="saveSettingsBtn" class="primary-btn">保存</button>
      </div>
      <div class="form-group" style="margin-top: 10px;">
        <button id="logoutBtn" class="danger-btn">断开连接</button>
      </div>
    </div>
  </div>

  <!-- 历史消息面板 -->
  <div id="historyPanel" class="history-panel hidden">
    <div class="panel-header">
      <span>消息记录</span>
      <div class="header-btns">
        <button id="closeHistoryBtn" class="close-btn" title="关闭">×</button>
      </div>
    </div>
    <div class="history-messages" id="historyList">
      <!-- 消息内容 -->
    </div>
  </div>

  <!-- 桌宠区域 -->
  <div class="pet-container">
    <!-- 消息气泡 -->
    <div id="bubble" class="bubble hidden">
      <div class="bubble-content" id="bubbleContent">...</div>
      <div class="bubble-arrow"></div>
    </div>

    <!-- 输入框气泡 -->
    <div id="inputBubble" class="bubble input-bubble hidden">
      <input type="text" id="petInput" placeholder="说点什么..." autocomplete="off">
      <div class="bubble-arrow"></div>
    </div>

    <!-- 宠物本体 -->
    <div id="pet" class="pet">🐱</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
